services:
  - type: web
    name: truck-package-counter
    runtime: docker
    rootDir: backend
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CAMERA_SOURCE
        value: upload
      - key: DEVICE
        value: cpu
      - key: HALF
        value: false
      - key: CONF
        value: 0.35
      - key: IMGSZ
        value: 320
      - key: COUNT_MODE
        value: zone
      - key: MAX_UPLOAD_WIDTH
        value: 640
      - key: TORCH_NUM_THREADS
        value: 1
